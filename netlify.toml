# netlify.toml

# Standard build settings
[build]
  command = "npm run build"
  publish = "dist"

# 1. Proxy for Claude
[[redirects]]
  from = "/api-anthropic/*"
  to = "https://api.anthropic.com/:splat"
  status = 200
  force = true
  # This header helps bypass some proxy-level Method Not Allowed errors
  headers = {X-From = "Netlify"}

[[redirects]]
  from = "/api-gemini/*"
  to = "https://generativelanguage.googleapis.com/:splat"
  status = 200
  force = true
  # Ensuring the key is passed for the new v1 endpoint
  query = {key = ":key"}